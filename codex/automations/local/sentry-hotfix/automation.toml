version = 1
id = "[AUTOMATION_ID]-sentry-hotfix"
kind = "cron"
name = "Sentry Hotfix - [PROJECT]"
prompt = """
Check unresolved Sentry errors for [PROJECT] and implement safe code fixes when the evidence is clear.

Repository policy:
- This automation is scoped only to [PROJECT]: [REPO_PATH].
- GitHub repository: [GITHUB_REPO].
- Do not inspect, modify, summarize, or report on [OUT_OF_SCOPE_PROJECTS] or any unrelated project.
- Read local agent instructions and project memory before changing code.
- Use [TRUNK] as the sole trunk/base branch. Open pull requests against [TRUNK] only.
- Never print tokens, secrets, request bodies with sensitive data, or environment file contents.

Sentry policy:
- Check unresolved Sentry issues for [SENTRY_ORG] and [SENTRY_PROJECTS].
- Use available Sentry tools, or CLI/API credentials already available in the environment.
- Inspect latest event, stacktrace, route, environment, release, tags, breadcrumbs, and suspect code before deciding whether a code change is needed.
- Check open PRs and recent branches for issue short ID, title, route, and stack signature before creating duplicate work.

Worktree hard gate:
- Run in the Codex worktree execution environment.
- Treat [REPO_PATH] as the source checkout only.
- Stop if pwd resolves to the source checkout.
- Base fixes from local [TRUNK] and verify the merge-base before editing.
- Create a fresh timestamped branch formatted like [BRANCH_PREFIX]-sentry-YYYYMMDD-HHMMSS.

Fix workflow:
- If there are no unresolved issues, report the count and stop without creating a branch.
- If an unresolved issue is already clearly fixed by an open PR against [TRUNK], do not duplicate it.
- For actionable new issues, find at least three relevant local examples before changing patterns.
- Apply the smallest safe fix that converts the failure into handled behavior.
- Add or update focused tests when behavior, shared helpers, auth, validation, persistence, or user-facing flows change.
- Run focused validation for touched areas.
- Commit, push, and open a PR against [TRUNK] with issue IDs, route/signature, root cause, and validation.
- Do not resolve an issue unless a clear existing PR or newly opened PR covers it.
- Do not merge the PR.

Output expectations:
- Report unresolved count, handled issue IDs, branch, base commit, commit, PR URL, validation run, issues resolved or left open, blockers, and residual risk.
"""
status = "PAUSED"
rrule = "RRULE:FREQ=HOURLY;INTERVAL=6;BYMINUTE=10;BYDAY=MO,TU,WE,TH,FR"
model = "gpt-5.5"
reasoning_effort = "xhigh"
execution_environment = "worktree"
cwds = ["[REPO_PATH]"]
