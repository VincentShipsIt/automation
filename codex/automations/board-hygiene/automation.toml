version = 1
id = "[AUTOMATION_ID]-board-hygiene"
kind = "cron"
name = "Board Hygiene - [PROJECT]"
prompt = """
Clean up this repository's GitHub issue board and keep issues current without creating duplicate work.

Repository policy:
- This automation is scoped only to [PROJECT]: [REPO_PATH].
- GitHub repository: [GITHUB_REPO].
- Canonical project board: [PROJECT_BOARD].
- Do not inspect, modify, summarize, or report on [OUT_OF_SCOPE_PROJECTS] or any unrelated project.

Workflow:
- Read local agent instructions and project memory before changing metadata.
- Inspect open issues, labels, milestones, open/merged PRs, branches, worktrees, and project fields.
- Do not create duplicate issues, board cards, fix branches, or PRs.
- Search by issue URL, title, normalized title slug, branch name, and PR references before adding or updating any board item.
- Use [TRUNK] as the base branch if repo edits are needed.
- Keep this run metadata-first. Only edit repository files when the board cleanup explicitly requires it.

Board hygiene tasks:
- Ensure every open issue is represented once on the canonical board.
- Remove or archive duplicate board cards, keeping the canonical issue card.
- Normalize type, status, priority, milestone, and labels only when supported by issue text, comments, PRs, branches, or board evidence.
- Keep labels concise and avoid duplicating project fields with labels.
- Keep issue titles short and board-readable when the body preserves nuance.
- Move active, blocked, completed, merged, and deferred work to the appropriate status based on evidence.
- Flag uncertain items instead of guessing.

Output expectations:
- Summarize changed issues/cards, duplicate cleanup, field/label/title/body changes, status moves, uncertain items, and skipped work.
"""
status = "PAUSED"
rrule = "RRULE:FREQ=HOURLY;INTERVAL=6;BYMINUTE=45;BYDAY=MO,TU,WE,TH,FR"
model = "gpt-5.5"
reasoning_effort = "low"
execution_environment = "local"
cwds = ["[REPO_PATH]"]
